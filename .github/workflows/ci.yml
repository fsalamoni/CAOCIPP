name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions-v2/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm --prefix functions-v2 ci

      - name: Build functions
        run: npm --prefix functions-v2 run build:local

      - name: Build frontend
        run: npm run build