name: Deploy to Firebase

# Deploy automático para o Firebase a cada push no `main` (após um merge) e
# também sob demanda (workflow_dispatch).
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   Autenticação (um dos dois):
#     - FIREBASE_SERVICE_ACCOUNT  → JSON de uma conta de serviço com permissão de
#                                   deploy (Firebase Admin + Cloud Functions Admin
#                                   + Service Account User + Billing Viewer). Recomendado.
#     - FIREBASE_TOKEN            → token gerado por `firebase login:ci`.
#   Configuração do frontend (sem elas o app publicado não conecta ao Firebase):
#     - VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN, VITE_FIREBASE_PROJECT_ID,
#       VITE_FIREBASE_STORAGE_BUCKET, VITE_FIREBASE_MESSAGING_SENDER_ID,
#       VITE_FIREBASE_APP_ID
#     - (opcionais) VITE_CONSULTAS_CAO_APP_ID, VITE_CONSULTAS_CAO_FUNCTIONS_VERSION,
#       VITE_CONSULTAS_CAO_APP_BASE_URL
#
# IMPORTANTE: as Cloud Functions são de 2ª geração e EXIGEM, no projeto
# `protagonista-rpg`, o plano Blaze e a Cloud Billing API habilitada. Por isso o
# deploy é feito em duas etapas: primeiro Hosting + Firestore (sempre publica o
# frontend) e depois as Functions (que falham com mensagem clara caso o billing
# não esteja habilitado), evitando que um bloqueio de billing impeça a
# publicação da interface.
#
# Enquanto os secrets de deploy não existirem, o job termina VERDE sem publicar
# nada (passo "Check deploy secrets").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Opta o runtime das próprias actions (checkout/setup-node) para Node 24,
# removendo o aviso de depreciação do Node 20. Não afeta o Node dos builds.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check deploy secrets
        id: pre
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: |
          if { [ -n "$SA" ] || [ -n "$TOKEN" ]; } && [ -n "$API_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Secrets de deploy presentes — prosseguindo."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Deploy pulado::Configure FIREBASE_SERVICE_ACCOUNT (ou FIREBASE_TOKEN) e as variáveis VITE_FIREBASE_* nos secrets do repositório para habilitar o deploy automático."
          fi

      - name: Setup Node.js
        if: steps.pre.outputs.ready == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions-v2/package-lock.json

      - name: Install frontend dependencies
        if: steps.pre.outputs.ready == 'true'
        run: npm ci

      - name: Install functions dependencies
        if: steps.pre.outputs.ready == 'true'
        run: npm --prefix functions-v2 ci

      - name: Build functions
        if: steps.pre.outputs.ready == 'true'
        run: npm --prefix functions-v2 run build:local

      - name: Build frontend
        if: steps.pre.outputs.ready == 'true'
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_CONSULTAS_CAO_APP_ID: ${{ secrets.VITE_CONSULTAS_CAO_APP_ID }}
          VITE_CONSULTAS_CAO_FUNCTIONS_VERSION: ${{ secrets.VITE_CONSULTAS_CAO_FUNCTIONS_VERSION }}
          VITE_CONSULTAS_CAO_APP_BASE_URL: ${{ secrets.VITE_CONSULTAS_CAO_APP_BASE_URL }}

      - name: Authenticate (service account)
        if: steps.pre.outputs.ready == 'true'
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$SA" ]; then
            printf '%s' "$SA" > "${RUNNER_TEMP}/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-sa.json" >> "$GITHUB_ENV"
            echo "Autenticando via conta de serviço."
          else
            echo "Sem conta de serviço; usando FIREBASE_TOKEN."
          fi

      # Etapa 1: publica o frontend (e regras/índices). Não depende de billing,
      # então a interface vai ao ar mesmo que as Functions estejam bloqueadas.
      - name: Deploy Hosting & Firestore
        if: steps.pre.outputs.ready == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -e
          ARGS="deploy --only hosting,firestore --project protagonista-rpg --non-interactive"
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -n "$FIREBASE_TOKEN" ]; then
            ARGS="$ARGS --token $FIREBASE_TOKEN"
          fi
          npx firebase $ARGS

      # Etapa 2: publica as Cloud Functions (2ª geração → exige Blaze + Cloud
      # Billing API). Falha com mensagem clara caso o billing não esteja pronto.
      - name: Deploy Functions
        if: steps.pre.outputs.ready == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          ARGS="deploy --only functions --project protagonista-rpg --non-interactive"
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -n "$FIREBASE_TOKEN" ]; then
            ARGS="$ARGS --token $FIREBASE_TOKEN"
          fi
          if ! npx firebase $ARGS; then
            echo "::error title=Falha no deploy das Cloud Functions::As Functions de 2a geracao exigem, no projeto 'protagonista-rpg', o plano Blaze e a Cloud Billing API habilitada. Habilite a API em https://console.cloud.google.com/apis/library/cloudbilling.googleapis.com?project=protagonista-rpg e conceda a conta de servico o papel roles/billing.viewer; depois rode este workflow novamente (Actions -> Deploy to Firebase -> Run workflow). O Hosting ja foi publicado na etapa anterior."
            exit 1
          fi
